# ═══════════════════════════════════════════════════════════════════
#  PAN CNI – Network Intercept for GKE
#
#  ⚠️  DO NOT DEPLOY THIS FILE DIRECTLY
#
#  The official PAN CNI is delivered as a Helm chart from SCM.
#  After downloading the Terraform ZIP from SCM, run:
#
#  1. Unzip the SCM bundle (Add Protections → Download Terraform)
#  2. Locate the directory: architecture/helm/
#  3. Set fwtrustcidr in values.yaml:
#     grep fwtrustcidr values.yaml
#     sed -i '' 's/fwtrustcidr: ""/fwtrustcidr: "TRUST_VPC_CIDR\/24"/' values.yaml
#
#  4. Install the Helm chart:
#     helm install ai-runtime-security . \
#       --namespace kube-system \
#       --values values.yaml
#
#  5. Annotate the namespace (ONLY ai-chatbot, NOT ai-api-chatbot):
#     kubectl annotate namespace ai-chatbot \
#       paloaltonetworks.com/firewall=pan-fw --overwrite
#
#  6. Restart pods:
#     kubectl rollout restart deployment/ai-chatbot -n ai-chatbot
#
#  7. Verify:
#     helm list -A | grep ai-runtime
#     kubectl get pods -A | grep pan-cni
#     kubectl get endpointslice -n kube-system | grep pan
#
#  Documentation:
#  https://docs.paloaltonetworks.com/ai-runtime-security/administration
# ═══════════════════════════════════════════════════════════════════
#
# This file is intentionally empty — the CNI is installed via Helm.
# Keep this file as documentation of the process.
